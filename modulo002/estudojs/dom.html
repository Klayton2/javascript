<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #area{
            width: 200px;
            height: 200px;
            margin: auto;
            color: white;
            font: normal 20pt Arial;
            background-color: rgba(51, 134, 51, 0.664);
            align-content: center;
            text-align: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="area" >
        interaja
    </div>
    <script>
        let div = document.getElementById('area');

        div.addEventListener('click',clicar);
        div.addEventListener('mouseenter',entrar);
        div.addEventListener('mouseout',sair);

        function clicar(){
            div.innerText = 'cliclou';
            div.style.background = 'red';
        }

        function entrar(){
            div.innerText = 'entrou!';
        }
        function sair(){
            div.innerText = 'saiu!';
            div.style.background = ' rgba(51, 134, 51, 0.664)';
        }
    </script>
</body>
</html>

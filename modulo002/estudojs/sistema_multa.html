<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de multa</title>
</head>
<body>
    <h1>Sistema de multas</h1>
    velocidade do carro: <input type="number" name="txtv" id="txtv"> Km/h
    <input type="button" value="verificar" onclick="cal()">

    <div class="res"></div>

    <script>
        function cal(){
            var txtv = document.querySelector('input#txtv');
            var res = document.querySelector('div.res');
            var vel = Number(txtv.value);

            res.innerHTML = `<p>A sua velocidade é <strong>${vel} Km/h</strong></p>`;
            if (vel > 60){
                res.innerHTML += `<p>Você está <strong>MULTADO !</strong> por excesso de velocidade</p>`;
            }
        }
    </script>
</body>
</html>

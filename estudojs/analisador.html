<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de números</title>
    <style>
        body {
            padding: 4% 40px;
            background-color: rgb(253, 191, 109);
        }
        
        header h1 {
            font: bolder 45pt Arial;
            text-align: center;
        }
        section {
            background-color: white;
            padding: 10px;
            border-radius: 15px;
            align-items: center;
            justify-content: center;
        }
        select {
            width: 150px;
        }
        button#btn-fim {
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Analisador de números</h1>
    </header>
    <section>
        <div class="numero">
            <label>Número(Entre 1 e 100): </label><input type="number" name="num" id="num">
            <input type="button" id="btn-add" value="Adicionar" onclick="addNum()">
            <br>
            <br>
            <select name="lista" id="lista" size="6">
            </select>
            <br>
            <input type="button" id="btn-fim" value="Finalizar" onclick="finalizar()"> 
        </div>
        

        <div class="res" id="res">
            
            
        </div>
    </section>
    <script>
        let num = document.getElementById('num');
        let lista = document.getElementById('lista');
        let res = document.getElementById('res');
        let a = [];

        function numero (n){
            if(Number(n)>= 1 && Number(n)<= 100){
                return true;
            }else{
                return false;
            }
        }

        function add (n , l) {
            if(l.indexOf(Number(n)) != -1) {
                return true;
            }else {
                return false;
            }

        }

        function addNum(){
            
            if(numero(num.value) && !add(num.value, a)){

                a.push(Number(num.value));
                let item = document.createElement('option');
                item.text = `Valor ${num.value} adicionado`;
                lista.appendChild(item);
                res.innerHTML = '';

            }else{
                alert('Valor inválido ou já encontrado na lista !')
            }
            num.value = '';
            num.focus();

        }

        function finalizar(){
            if(a.length == 0){
                alert('Adicione valores antes de finalizar');

            }else{
                let tot = a.length;
                let maior = a[0];
                let menor = a[0];
                let soma = 0;
                let media = 0;


                for(let pos in a){
                    soma += a[pos];

                    media = soma/a.length;

                    if(a[pos] > maior){
                        maior = a[pos];
                    }else if(a[pos] < menor){
                        menor = a[pos];
                    }
                }
                res.innerHTML = '';
                res.innerHTML += `<p>Ao todo, temos ${tot} números cadastrados</p>`;
                res.innerHTML += `<p>O maior número cadastrado é ${maior}</p>`;
                res.innerHTML += `<p>O menor número cadastrado é ${menor}</p>`;
                res.innerHTML += `<p>A soma de todos os números cadastrados é ${soma}</p>`;
                res.innerHTML += `<p>A média de todos os números cadastrados é ${media.toFixed(2)}</p>`;
                
            }
        }

    </script>
</body>
</html>

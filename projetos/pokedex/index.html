<!DOCTYPE html>

    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Pokedex</title>
</head>
<body>

        <div class="pokemon-boxes">
            
        </div>
    </div>
    <script src="script.js"></script>

</html>
